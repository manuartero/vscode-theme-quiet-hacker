# Quiet Hacker - TOML Preview
[package]
name = "quiet-hacker"
version = "1.0.0"
edition = "2024"
authors = ["manuartero"]
description = "A minimal hacker theme"
license = "MIT"

[dependencies]
tokio = { version = "1.36", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"

[dev-dependencies]
criterion = "0.5"
proptest = "1.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = "symbols"

[profile.dev]
opt-level = 0
debug = true

[[bin]]
name = "server"
path = "src/main.rs"

[server]
host = "0.0.0.0"
port = 8080
workers = 4
max_connections = 1024
timeout_secs = 30

[server.tls]
enabled = true
cert = "/etc/ssl/cert.pem"
key = "/etc/ssl/key.pem"

[database]
url = "postgres://localhost:5432/hacker_db"
pool_min = 2
pool_max = 10
